<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 500</title>
    <style>
        body {
            font-family: 'Arial', sans-serif; 
            background-image: url("../theo_punisher.png"); 
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center; 
        }

        h1 {
            font-size: 48px; 
            margin-bottom: 20px; 
            color: #e74c3c;
        }

        p {
            font-size: 18px; 
            color: #666; 
        }

        a {
            display: inline-block; 
            margin-top: 20px;
            text-decoration: none; 
            color: #3498db;
            font-weight: bold; 
            transition: color 0.3s; 
        }

        a:hover {
            color: #2980b9;
        }
    </style>
</head>
<body>
    <div>
        <h1>Error 500: Internal Server Error</h1>
        <p>Something went wrong on our end. Please try again later.</p>
        <a href="/">Return to Home</a>
    </div>
</body>
</html>
