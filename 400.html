<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 500</title>
    <style>
        body {
            font-family: 'Arial', sans-serif; /* Use a clean, sans-serif font */
            background-color: #f0f0f0; /* Light grey background */
            color: #333; /* Dark text color for readability */
            display: flex; /* Use flexbox for centering */
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
            height: 100vh; /* Full viewport height */
            margin: 0; /* Remove default margin */
            text-align: center; /* Center text */
        }

        h1 {
            font-size: 48px; /* Large font size for the error message */
            margin-bottom: 20px; /* Space below the heading */
            color: #e74c3c; /* Red color for emphasis */
        }

        a {
            display: inline-block; /* Make link a block for better click area */
            margin-top: 20px; /* Space above the link */
            text-decoration: none; /* Remove underline */
            color: #3498db; /* Blue color for links */
            font-weight: bold; /* Make link bold */
            transition: color 0.3s; /* Smooth transition for hover effect */
        }
        p {
            font-size: 18px; /* Slightly smaller font for additional text */
            color: #666; /* Grey color for less emphasis */
        }


        a:hover {
            color: #2980b9; /* Darker blue on hover */
        }
    </style>
</head>
<body>
    <div>
        <h1>Error 400: Bad Request</h1>
        <p></p>

        <a href="/">Return to Home</a> <!-- Link back to home -->
    </div>
</body>
</html>
